[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "php84Extensions.mbstring", "php84Extensions.openssl", "php84Extensions.pdo", "php84Extensions.pdo_sqlite", "php84Extensions.sqlite3", "php84Extensions.curl", "php84Extensions.zip", "php84Extensions.fileinfo", "php84Extensions.tokenizer", "php84Extensions.xml", "php84Extensions.ctype"]

[phases.install]
cmds = ["composer install --ignore-platform-reqs --no-dev --optimize-autoloader"]

[phases.build]
cmds = []

[start]
cmd = "php artisan config:clear && php artisan route:clear && php artisan migrate --force && php -S 0.0.0.0:${PORT:-8080} -t public"